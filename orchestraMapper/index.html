<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orchestra Layout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="controls">
    <button id="export-btn">Export PNG</button>
    <button id="print-btn">Print</button>
  </div>
  <div class="options">
    <label>
      <input type="checkbox" id="show-labels">
      Show Section Labels
    </label>
    <label>
      <input type="checkbox" id="show-counts">
      Show Row Counts
    </label>
    <label>
      <input type="checkbox" id="use-images" checked>
      Use Images
    </label>
  </div>
  <div class="main-content">
    <div id="canvas-container">
      <canvas id="orchestra-canvas"></canvas>
    </div>
    <div id="editor-container">
      <textarea id="json-editor" placeholder="Paste JSON here..."></textarea>
      <button id="apply-btn">Apply</button>
    </div>
  </div>

  <script src="orchestra.js"></script>
  <script src="app.js"></script>
</body>
</html>
